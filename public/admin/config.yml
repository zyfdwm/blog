# Decap CMS Configuration
# Docs: https://decapcms.org/docs/

backend:
  name: github
  repo: zyfdwm/blog   # ← ganti ini
  branch: main
  base_url: https://sveltia-cms-auth.faizxdwm.workers.dev/  # ← ganti ini (lihat README)

# Uncomment buat local dev (jalanin: npx decap-server)
# local_backend: true

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: "posts"
    label: "Artikel"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Judul"
        name: "title"
        widget: "string"
        hint: "Judul artikel"

      - label: "Tanggal"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        default: ""

      - label: "Deskripsi"
        name: "description"
        widget: "string"
        required: false
        hint: "Ringkasan singkat, tampil di list artikel"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Pisah dengan Enter"

      - label: "Konten"
        name: "body"
        widget: "markdown"
